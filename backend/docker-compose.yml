services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roadmap-planner-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
